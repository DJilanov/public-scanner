server {
    listen 80;
    server_name publicauctions.jilanov.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name publicauctions.jilanov.com;

    ssl_certificate /etc/letsencrypt/live/publicauctions.jilanov.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/publicauctions.jilanov.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/public-scanner/apps/web/dist;
    index index.html;
    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:3201/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3201/health;
    }

    location /ready {
        proxy_pass http://127.0.0.1:3201/ready;
    }

    location /live {
        proxy_pass http://127.0.0.1:3201/live;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
